# Hosts must match what's live: every host here lands on the single
# opengittr-tls Let's Encrypt certificate, so adding a domain whose DNS does
# not point at the cluster fails the cert order for ALL hosts (including .com).
# Add .io/.dev/.net/.org back only after their DNS A records point here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opengittr-website
  namespace: opengittr
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - opengittr.com
    - www.opengittr.com
    secretName: opengittr-tls
  rules:
  - host: opengittr.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opengittr-website
            port:
              number: 80
  - host: www.opengittr.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opengittr-website
            port:
              number: 80
