# OpenGittr marketing website — opengittr.com
# Prerendered static HTML served by gostatic on :8000 (gofr metrics on :9090).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opengittr-website
  namespace: opengittr
  labels:
    app: opengittr-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opengittr-website
  template:
    metadata:
      labels:
        app: opengittr-website
    spec:
      containers:
      - name: website
        image: gcr.io/opengittr/opengittr-website:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "128Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /.well-known/alive
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /.well-known/alive
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
