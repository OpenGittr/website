name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - run: gcloud auth configure-docker --quiet
      - name: Build and push
        run: |
          IMAGE=gcr.io/${{ secrets.GCP_PROJECT_ID }}/opengittr-website
          docker build --platform linux/amd64 -t "$IMAGE:$GITHUB_SHA" -t "$IMAGE:latest" .
          docker push "$IMAGE:$GITHUB_SHA"
          docker push "$IMAGE:latest"
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
      - name: Deploy
        run: |
          # Pin the deployment to the immutable SHA tag so every rollout is traceable.
          sed -i "s|gcr.io/opengittr/opengittr-website:latest|gcr.io/${{ secrets.GCP_PROJECT_ID }}/opengittr-website:$GITHUB_SHA|" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/opengittr-website -n opengittr --timeout=5m
      - name: Verify
        run: kubectl get pods -l app=opengittr-website -n opengittr
